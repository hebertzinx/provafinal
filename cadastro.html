<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pacientes - Clínica Médica</title>
    <style>
    
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #218838; }
        #mensagem { margin-top: 15px; text-align: center; font-weight: bold; }
        
    </style>
</head>
<body>

<div class="container">
    <h2>Cadastro de Paciente</h2>
    
    <form id="formCadastro">
        <div class="form-group">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite o nome" required>
        </div>

        <div class="form-group">
            <label for="celular">Celular:</label>
            <input type="tel" id="celular" name="celular" placeholder="(00) 00000-0000" required>
        </div>

        <div class="form-group">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
        </div>

        <button type="submit">Finalizar Cadastro</button>
    </form>

    <div id="mensagem"></div>
</div>

<script>
    // Aqui entraria a lógica de conexão com o Supabase explicada anteriormente
    const form = document.getElementById('formCadastro');
    const msg = document.getElementById('mensagem');

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        // Simulação de envio
        msg.style.color = "green";
        msg.innerText = "Enviando dados para o Supabase...";
        
        // No Passo 4, você substituiria isso pela função supabase.from().insert()
    });
</script>

</body>
</html>
